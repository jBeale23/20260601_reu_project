# Derived from PDB 1DKX (E. coli DnaK SBD + peptide NRLLLTG, chain B).
# contact_residues: protein C-alpha atoms within 8 Å of the peptide backbone.
# shell_radius_angstrom: additional protein residues within this distance of
#   mapped contact residues are included when analyzing each structure.
# sbd_residue_range: UniProt residue numbers for the SBD on P0A6Y8 (1DKX
