name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  shellcheck:
    name: Lint (Shellcheck)
    uses: ./.github/workflows/shellcheck.yaml

  shfmt:
    name: Format (shfmt)
    needs: shellcheck
    uses: ./.github/workflows/shfmt.yaml

  ruff:
    name: Lint & Format (Ruff)
    uses: ./.github/workflows/ruff.yaml

  unit_test:
    name: Run Test Suite
    needs: [shfmt, ruff]
    uses: ./.github/workflows/unit-test.yaml

  pipeline_completion:
    name: Pipeline Completion
    runs-on: ubuntu-latest
    if: always()
    needs:
      - shellcheck
      - shfmt
      - ruff
      - unit_test
    steps:
      - name: Determine Pipeline Succes
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
