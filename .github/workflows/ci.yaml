name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  shellcheck:
    name: Lint (Shellcheck)
    uses: ./.github/workflows/shfmt.yaml

  shfmt:
    name: Format (shmft)
    needs: shellcheck
    uses: ./.github/workflows/shellcheck.yaml

  ruff:
    name: Lint & Format (Ruff)
    uses: ./.github/workflows/ruff.yaml

  unit_test:
    name: Run Test Suite
    needs: [shfmt, ruff]
    uses: ./.github/workflows/unit-test.yaml

  pipeline_completion:
    name: Pipeline Completion
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Pipeline succeeded
        if: needs.unit_test.result == 'success'
        run: printf "All checks passed successfully!\n"
